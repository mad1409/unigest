
version: '3.8'

services:

  postgres:
    image: postgres:15-alpine
    container_name: unigest_db
    restart: always
    environment:
      POSTGRES_DB:       ${DB_NAME:-unigest}
      POSTGRES_USER:     ${DB_USER:-unigest}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-unigest_secret}
    volumes:
      - unigest_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-unigest}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: unigest_api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_NAME:     ${DB_NAME:-unigest}
      DB_USER:     ${DB_USER:-unigest}
      DB_PASSWORD: ${DB_PASSWORD:-unigest_secret}
      JWT_SECRET:  ${JWT_SECRET:-change_me}
      PORT:        4000
      NOM_ETABLISSEMENT: ${NOM_ETABLISSEMENT:-Universite}
      ANNEE_ACADEMIQUE:  ${ANNEE_ACADEMIQUE:-2025/2026}
      ANNEES_DISPONIBLES: ${ANNEES_DISPONIBLES:-2025/2026}
      SEMESTRE_ACTIF:    ${SEMESTRE_ACTIF:-1}
      ADMIN_ID:       ${ADMIN_ID:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ADMIN_NAME:     ${ADMIN_NAME:-Administration}
    ports:
      - "4000:4000"
    volumes:
      - ./.env:/app/.env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: unigest_web
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf

volumes:
  unigest_data:
    driver: local
